# cargo-deny configuration for sauron-core.
#
# Run locally with:
#   cargo install --locked cargo-deny
#   cargo deny --manifest-path core/Cargo.toml check
#
# Three checks are enabled by default in CI: advisories, bans, licenses.

[graph]
# Restrict the dependency graph audit to the target we actually ship.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
]
all-features = false
no-default-features = false

[advisories]
# Source of CVE/advisory data.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
# Fail the build on any known vulnerability or unmaintained crate.
yanked = "deny"
ignore = []

[licenses]
# Allow only OSI-approved, GPL-compatible permissive licenses for a
# commercial-friendly binary. Anything copyleft or unknown breaks the build
# and forces an explicit decision.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
# Detect multiple versions of the same crate (bloats the binary, slows builds,
# can mask CVEs by pinning an old transitive). Warn-only initially; flip to
# "deny" once duplicates are squashed.
multiple-versions = "warn"
wildcards = "deny"           # forbids `version = "*"` in Cargo.toml
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
