# Production-shaped compose template. This intentionally has no default secrets.
# Use a secret manager or environment injection in real deployments.
services:
  backend:
    build: ../core
    image: sauronid-backend:${SAURONID_IMAGE_TAG:-latest}
    ports:
      - "${SAURONID_BACKEND_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - ENV=production
      - DATABASE_PATH=${DATABASE_PATH:?DATABASE_PATH is required}
      - SAURON_ACCEPT_SINGLE_NODE_SQLITE=${SAURON_ACCEPT_SINGLE_NODE_SQLITE:?acknowledge SQLite or replace the data tier}
      - SAURON_ALLOWED_ORIGINS=${SAURON_ALLOWED_ORIGINS:?SAURON_ALLOWED_ORIGINS is required}
      - SAURON_ADMIN_KEY=${SAURON_ADMIN_KEY:?SAURON_ADMIN_KEY is required}
      - SAURON_TOKEN_SECRET=${SAURON_TOKEN_SECRET:?SAURON_TOKEN_SECRET is required}
      - SAURON_JWT_SECRET=${SAURON_JWT_SECRET:?SAURON_JWT_SECRET is required}
      - SAURON_OPRF_SEED=${SAURON_OPRF_SEED:?SAURON_OPRF_SEED is required}
      - SAURON_ISSUER_URLS=${SAURON_ISSUER_URLS:-http://zkp-issuer:4000}
      - SAURON_ISSUER_SHARED_SECRET=${SAURON_ISSUER_SHARED_SECRET:?SAURON_ISSUER_SHARED_SECRET is required}
    restart: unless-stopped

  dashboard:
    build:
      context: ../dashboard
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    image: sauronid-dashboard:${SAURONID_IMAGE_TAG:-latest}
    ports:
      - "${SAURONID_DASHBOARD_PORT:-3000}:3000"
    environment:
      - SAURON_CORE_INTERNAL_URL=${SAURON_CORE_INTERNAL_URL:-http://backend:3001}
      - SAURON_ADMIN_KEY=${SAURON_ADMIN_KEY:?SAURON_ADMIN_KEY is required}
      - SAURONID_ADMIN_PROXY_TOKEN=${SAURONID_ADMIN_PROXY_TOKEN:?SAURONID_ADMIN_PROXY_TOKEN is required}
    depends_on:
      - backend
    restart: unless-stopped

  zkp-issuer:
    build: ../zkp/issuer
    image: sauronid-zkp-issuer:${SAURONID_IMAGE_TAG:-latest}
    environment:
      - PORT=4000
      - ISSUER_DID=${ISSUER_DID:?ISSUER_DID is required}
      - ISSUER_SEED=${ISSUER_SEED:?ISSUER_SEED is required}
      - SAURON_ISSUER_SHARED_SECRET=${SAURON_ISSUER_SHARED_SECRET:?SAURON_ISSUER_SHARED_SECRET is required}
    restart: unless-stopped
