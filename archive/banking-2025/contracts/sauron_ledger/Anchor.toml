[toolchain]
anchor_version = "0.32.1"
solana_version = "3.1.4"

[features]
resolution = true
skip-lint = false

[programs.devnet]
sauron_ledger = "JBzHgwjGSYcC4YRgLnHVdLUDbmE5gcHYtPyjZx1PXNgR"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
# Chemin vers ton wallet Devnet (celui approvisionné avec 5 SOL)
wallet = "~/.config/solana/id.json"

[scripts]
test   = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
deploy = "ts-node migrations/deploy.ts"
