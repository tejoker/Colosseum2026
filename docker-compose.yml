# SauronID unified local stack: core + KYC + ZKP issuer + UIs + CAMARA mock + analytics + anomaly + EVM node.
# Subgraph: see subgraph/ — deploy/index alongside this stack in your environment.
services:
  # ── Rust backend (Sauron Core) ──────────────────────────────────────────────
  backend:
    build: ./core
    image: hackeurope-24-backend:latest
    container_name: sauron-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ENV=${ENV:-development}
      - SAURON_ACCEPT_SINGLE_NODE_SQLITE=${SAURON_ACCEPT_SINGLE_NODE_SQLITE:-1}
      - SAURON_ISSUER_URL=${SAURON_ISSUER_URL:-http://zkp-issuer:4000}
      # Development default only; production requires >=32-byte keys (see admin::init_admin_auth).
      - SAURON_ADMIN_KEY=${SAURON_ADMIN_KEY:-super_secret_hackathon_key}
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:3001/admin/stats -H \"x-admin-key: $$SAURON_ADMIN_KEY\" || exit 1" ]
      interval: 3s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  # ── Seed (one-shot — réutilise l'image backend) ─────────────────────────────
  seed:
    image: hackeurope-24-backend:latest
    container_name: sauron-seed
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - SAURON_URL=http://backend:3001
      - SEED_USERS=200
      - SAURON_ADMIN_KEY=${SAURON_ADMIN_KEY:-super_secret_hackathon_key}
    volumes:
      - ./data:/app/data:ro
    entrypoint: [ "bash", "seed.sh" ]
    restart: "no"

  # ── KYC Python service ─────────────────────────────────────────────────────
  kyc:
    build: ./KYC
    container_name: sauron-kyc
    ports:
      - "8000:8000"
    env_file:
      - ./KYC/.env
    restart: unless-stopped

  # ── Partner Portal (Next.js — B2B Client Simulator) ─────────────────────────
  partner-portal:
    build:
      context: ./partner-portal
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3001"
        NEXT_PUBLIC_KYC_URL: "http://localhost:8000"
    container_name: sauron-partner-portal
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Sauron Dashboard UI (Next.js — port 8003) ───────────────────────────────
  sauron-dashboard-ui:
    build:
      context: ./sauron-dashboard
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3001"
        NEXT_PUBLIC_DASH_API_URL: "http://localhost:8002"
    container_name: sauron-dashboard-ui
    ports:
      - "8003:8003"
    depends_on:
      backend:
        condition: service_healthy
      sauron-analytics-api:
        condition: service_started
    restart: unless-stopped

  # ── Sauron Analytics API (Python — port 8002) ─────────────────────────────
  sauron-analytics-api:
    build: ./data/sauron
    container_name: sauron-analytics-api
    ports:
      - "8002:8002"
    environment:
      - SAURON_URL=http://backend:3001
      - DATA_DIR=/app/csvdata
    volumes:
      - ./data/companies.csv:/app/csvdata/companies.csv:ro
      - ./data/company_trends.csv:/app/csvdata/company_trends.csv:ro
      - ./data/personas.csv:/app/csvdata/personas.csv:ro
      - ./data/config.py:/app/csvdata/config.py:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── ZKP Issuer (OID4VCI — port 4000) ──────────────────────────────────
  zkp-issuer:
    build: ./zkp/issuer
    container_name: sauron-zkp-issuer
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - ISSUER_DID=did:sauron:issuer:1
      - ISSUER_SEED=sauronid-issuer-seed-hackathon
      - KYC_SERVICE_URL=http://kyc:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── CAMARA Mock Operator (port 9000) ───────────────────────────────────
  camara-mock:
    build: ./zkp/camara
    container_name: sauron-camara-mock
    ports:
      - "9000:9000"
    environment:
      - MOCK_OPERATOR_PORT=9000
    restart: unless-stopped

  # ── Anomaly Detection Engine (Python ML — port 8010) ─────────────────
  anomaly-engine:
    build: ./anomaly-engine
    container_name: sauron-anomaly-engine
    ports:
      - "8010:8010"
    environment:
      - PORT=8010
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Hardhat Local EVM Node (port 8545) ───────────────────────────────
  hardhat-node:
    build: ./contracts/revocation
    container_name: sauron-hardhat
    ports:
      - "8545:8545"
    command: npx hardhat node --hostname 0.0.0.0
    restart: unless-stopped
